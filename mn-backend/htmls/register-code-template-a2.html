<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>明叶同行 - 邮箱验证码模板 A2</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f3f7fb;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f3f7fb;margin:0;padding:30px 0;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:620px;width:100%;margin:0 auto;">
            <tr>
              <td style="padding:0 16px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#ffffff;border:1px solid #dbe8f4;border-radius:24px;box-shadow:0 14px 36px rgba(29,67,108,0.08);">
                  <tr>
                    <td style="padding:22px 26px 10px 26px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
                      <div style="font-size:24px;line-height:30px;font-weight:700;color:#1b4fd6;">明叶同行</div>
                      <div style="font-size:13px;line-height:22px;color:#6b7a8c;margin-top:4px;">邮箱验证码通知</div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:4px 26px 0 26px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#223041;">
                      <div style="font-size:20px;line-height:28px;font-weight:700;">请查收本次验证码</div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:10px 26px 0 26px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#536274;font-size:15px;line-height:27px;">
                      您本次的邮箱验证码如下，请在验证页面尽快输入。
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:18px 26px 0 26px;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f7fbff;border:2px dashed #9dc8ff;border-radius:18px;">
                        <tr>
                          <td align="center" style="padding:18px 12px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#0e6bff;font-size:34px;line-height:40px;font-weight:700;letter-spacing:10px;">
                            483920
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:18px 26px 0 26px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                        <tr>
                          <td style="background-color:#e8f2ff;color:#165fd2;border-radius:999px;padding:6px 12px;font-size:13px;line-height:20px;font-weight:600;">
                            5 分钟有效
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:14px 26px 0 26px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#536274;font-size:14px;line-height:26px;">
                      如非您本人操作，请忽略本邮件。为保障安全，请勿向任何人泄露验证码。
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:22px 26px 28px 26px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#91a0b2;font-size:12px;line-height:22px;">
                      此邮件由系统自动发送，请勿直接回复。
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
