<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>明叶同行 - 邮箱验证码模板 A3</title>
  </head>
  <body style="margin:0;padding:0;background-color:#edf3f9;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#edf3f9;margin:0;padding:28px 0;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:700px;width:100%;margin:0 auto;">
            <tr>
              <td style="padding:0 16px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#ffffff;border-radius:30px;box-shadow:0 22px 52px rgba(30,73,122,0.11);overflow:hidden;">
                  <tr>
                    <td style="padding:0;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:linear-gradient(135deg,#0f5de2 0%,#35c7d8 100%);">
                        <tr>
                          <td style="padding:28px 30px 26px 30px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#ffffff;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                              <tr>
                                <td valign="top">
                                  <div style="font-size:28px;line-height:36px;font-weight:700;">明叶同行</div>
                                  <div style="font-size:14px;line-height:24px;opacity:0.9;margin-top:6px;">邮箱安全验证中心</div>
                                </td>
                                <td align="right" valign="top">
                                  <span style="display:inline-block;border:1px solid rgba(255,255,255,0.35);border-radius:999px;padding:6px 12px;font-size:12px;line-height:18px;color:#ffffff;">REGISTER CODE</span>
                                </td>
                              </tr>
                            </table>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:30px 30px 0 30px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#1e2937;">
                      <div style="font-size:23px;line-height:32px;font-weight:700;">您好，正在验证您的邮箱身份</div>
                      <div style="font-size:15px;line-height:28px;color:#566579;margin-top:12px;">
                        为确保本次操作安全，请使用下面的验证码完成校验。验证码短时有效，仅用于当前请求。
                      </div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:22px 30px 0 30px;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#fbfdff;border:1px solid #d9e9fb;border-radius:24px;">
                        <tr>
                          <td style="padding:18px 20px 8px 20px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#728297;font-size:13px;line-height:20px;">
                            验证码
                          </td>
                        </tr>
                        <tr>
                          <td align="center" style="padding:0 20px 18px 20px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#116cf5;font-size:38px;line-height:46px;font-weight:700;letter-spacing:11px;">
                            483920
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:18px 30px 0 30px;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                        <tr>
                          <td width="50%" valign="top" style="padding-right:8px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f4f9ff;border-radius:16px;">
                              <tr>
                                <td style="padding:14px 16px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
                                  <div style="font-size:12px;line-height:18px;color:#7d8b9c;">有效时长</div>
                                  <div style="font-size:16px;line-height:24px;color:#174ea6;font-weight:700;margin-top:4px;">5 分钟内</div>
                                </td>
                              </tr>
                            </table>
                          </td>
                          <td width="50%" valign="top" style="padding-left:8px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f7fbff;border-radius:16px;">
                              <tr>
                                <td style="padding:14px 16px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
                                  <div style="font-size:12px;line-height:18px;color:#7d8b9c;">安全提醒</div>
                                  <div style="font-size:16px;line-height:24px;color:#174ea6;font-weight:700;margin-top:4px;">请勿转发他人</div>
                                </td>
                              </tr>
                            </table>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:18px 30px 30px 30px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#566579;font-size:14px;line-height:26px;">
                      如果这不是您的操作，说明可能有人误填了您的邮箱地址，您可以直接忽略这封邮件。
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:0 30px 30px 30px;">
                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-top:1px solid #e5edf5;">
                        <tr>
                          <td style="padding-top:18px;font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:#8c99aa;font-size:12px;line-height:22px;">
                            明叶同行系统邮件，请勿直接回复。<br />
                            本模板为后端验证码邮件候选视觉稿 A3。
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
